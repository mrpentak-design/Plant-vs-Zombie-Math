<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#6fb3d9">
<title>Plants vs Zombies: Đấu Trường Toán Học</title>
<style>
  :root{
    --cell: 68px;
    --cols: 9;
    --rows: 5;
  }
  *{ box-sizing: border-box; }
  body{
    touch-action:manipulation;
    -webkit-tap-highlight-color:transparent;
    -webkit-touch-callout:none;
    -webkit-user-select:none;
    user-select:none;
    overscroll-behavior:none;
    margin:0;
    font-family: 'Segoe UI', Tahoma, Verdana, sans-serif;
    background: radial-gradient(ellipse at top, #bfe6ff 0%, #8fcBea 40%, #6fb3d9 100%);
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:16px;
    color:#22331b;
  }
  h1{
    margin: 4px 0 12px;
    font-size: 1.5rem;
    color:#2c4a12;
    text-shadow: 1px 1px 0 #fff;
    text-align:center;
  }
  .topbar{
    display:flex;
    gap:14px;
    flex-wrap:wrap;
    justify-content:center;
    align-items:center;
    background:#5c3a21;
    border:3px solid #3e2513;
    border-radius:10px;
    padding:8px 14px;
    margin-bottom:10px;
  }
  .stat{
    background:#fceec2;
    border:2px solid #a97c33;
    border-radius:8px;
    padding:6px 12px;
    font-weight:bold;
    min-width:70px;
    text-align:center;
    color:#4a3300;
  }
  .stat small{ display:block; font-weight:normal; font-size:0.65rem; color:#7a5c1e; }
  #waveBar{ width:120px; height:10px; background:#4a3018; border-radius:5px; overflow:hidden; border:1px solid #3e2513; margin:4px auto 2px; }
  #waveBar i{ display:block; height:100%; width:0%; background:linear-gradient(#9ccc65,#558b2f); transition:width .5s; }
  button.tool{
    border:2px solid #3a6b1c;
    border-radius:8px;
    padding:8px 12px;
    font-weight:bold;
    cursor:pointer;
    background:#c8e6a0;
  }
  button.tool:hover{ filter:brightness(1.08); }
  button.tool.active{ outline:3px solid #ffb400; }
  .main-area{
    display:flex;
    gap:14px;
    align-items:flex-start;
  }
  .seedbank{
    display:flex;
    flex-direction:column;
    gap:8px;
    background:#8a5a2b;
    border:3px solid #5c3a1a;
    border-radius:10px;
    padding:10px;
  }
  .seed-card{
    width:96px;
    background:#f4d999;
    border:2px solid #a97c33;
    border-radius:8px;
    padding:6px;
    text-align:center;
    cursor:pointer;
    position:relative;
    user-select:none;
  }
  .seed-card.selected{ outline:3px solid #ff5e00; }
  .seed-card.disabled{ opacity:0.55; cursor:not-allowed; }
  .seed-card .icon{ line-height:1; }
  .seed-card .icon svg{ width:40px; height:40px; }
  .seed-card .name{ font-size:0.65rem; font-weight:bold; }
  .seed-card .cost{ font-size:0.75rem; color:#7a5c1e; font-weight:bold; }
  .seed-card .cooldown{
    position:absolute; inset:0;
    background:rgba(30,30,30,0.55);
    border-radius:6px;
    display:flex; align-items:center; justify-content:center;
    color:#fff; font-weight:bold;
  }
  .board-wrap{
    position:relative;
    width:max-content;
    background: linear-gradient(#c9a06a, #b98a52);
    border:4px solid #6b4423;
    border-radius:10px;
    overflow:hidden;
  }
  .board{
    position:relative;
    display:grid;
    grid-template-columns: repeat(var(--cols), var(--cell));
    grid-template-rows: repeat(var(--rows), var(--cell));
  }
  .cell{
    width:var(--cell); height:var(--cell);
    display:flex; align-items:center; justify-content:center;
    position:relative;
    cursor:pointer;
  }
  .cell.shadeA{ background:#93d05e; }
  .cell.shadeB{ background:#7fbf4e; }
  .cell.house-col{ box-shadow: inset 8px 0 6px -4px rgba(80,45,15,0.55); }
  .plant{ position:relative; z-index:2; pointer-events:none; filter:drop-shadow(0 2px 2px rgba(0,0,0,0.3)); }
  .plant svg{ width:52px; height:52px; animation:sway 3.4s ease-in-out infinite; transform-origin:50% 92%; }
  @keyframes sway{ 50%{ transform:rotate(2.5deg); } }
  .hp-bar{
    position:absolute; bottom:2px; left:8%; width:84%; height:5px;
    background:#333; border-radius:3px; overflow:hidden; z-index:3;
  }
  .hp-bar i{ display:block; height:100%; background:#3ddc3d; }
  .zombie{
    position:absolute;
    width:var(--cell); height:var(--cell);
    z-index:5;
    pointer-events:none;
    filter:drop-shadow(0 2px 2px rgba(0,0,0,0.4));
  }
  .zombie svg{ width:60px; height:60px; animation:zwalk 0.9s ease-in-out infinite; transform-origin:50% 88%; }
  @keyframes zwalk{ 0%,100%{ transform:rotate(-2.5deg); } 50%{ transform:rotate(2.5deg); } }
  .zombie.eating svg{ animation:zeat 0.45s ease-in-out infinite; }
  @keyframes zeat{ 50%{ transform:translateX(-5px) rotate(-5deg); } }
  .boom{
    position:absolute; z-index:25;
    width:200px; height:200px; border-radius:50%;
    background:radial-gradient(circle, #fff7ae 0%, #ffb300 35%, #ff5722 65%, rgba(255,87,34,0) 100%);
    pointer-events:none;
    animation:boomAnim .55s ease-out forwards;
  }
  @keyframes boomAnim{ 0%{ transform:scale(.2); opacity:1; } 100%{ transform:scale(1.15); opacity:0; } }
  .rowboom{
    position:absolute; left:0; width:100%; height:68px; z-index:25;
    background:linear-gradient(90deg, rgba(255,87,34,.95), rgba(255,196,0,.9), rgba(255,87,34,.95));
    pointer-events:none; border-radius:8px;
    animation:rowboomAnim .65s ease-out forwards;
  }
  @keyframes rowboomAnim{ 0%{ opacity:1; transform:scaleY(.3); } 40%{ opacity:1; transform:scaleY(1); } 100%{ opacity:0; transform:scaleY(1); } }
  .mode-btn{ display:block; width:100%; margin:10px 0; padding:14px; font-size:1.1rem; }
  .mode-btn small{ display:block; font-weight:normal; font-size:.75rem; margin-top:4px; color:#4a3300; }
  .zombie.frozen svg{ animation:none; filter:saturate(0.3) brightness(1.35) drop-shadow(0 0 7px #7fdcff); }
  .zombie .hp-bar{ bottom:0; }
  .pea{
    position:absolute;
    width:16px; height:16px;
    border-radius:50%;
    background: radial-gradient(circle at 30% 30%, #eaffb0, #7bc23a);
    z-index:6;
    box-shadow:0 0 3px rgba(0,0,0,0.4);
  }
  .brain{
    position:absolute;
    width:30px; height:30px;
    z-index:3;
    pointer-events:none;
    transition:opacity .9s;
  }
  .brain.eaten{ opacity:0; }
  .mower{
    position:absolute;
    width:46px; height:46px;
    z-index:4;
    pointer-events:none;
    filter:drop-shadow(0 2px 2px rgba(0,0,0,0.4));
  }
  .sun-token{
    position:absolute;
    width:54px; height:54px;
    z-index:30;
    cursor:pointer;
    animation:sunPulse 1.5s ease-in-out infinite;
    filter:drop-shadow(0 0 6px rgba(255,214,60,0.9));
  }
  @keyframes sunPulse{ 50%{ transform:scale(1.12) rotate(8deg); } }
  .floatText{
    position:absolute;
    font-weight:bold;
    text-shadow:1px 1px 2px #000;
    z-index:35;
    pointer-events:none;
    white-space:nowrap;
  }
  .banner{
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
    z-index:40; pointer-events:none;
    font-size:2.3rem; font-weight:900; color:#c62828;
    text-shadow:2px 2px 0 #fff, 3px 3px 4px rgba(0,0,0,0.4);
    opacity:0; transition:opacity .4s;
  }
  .banner.show{ opacity:1; }
  .overlay{
    position:fixed; inset:0; background:rgba(0,0,0,0.55);
    display:flex; align-items:center; justify-content:center;
    z-index:100;
  }
  .hidden{ display:none !important; }
  .modal{
    background:#fdf6e3; border:4px solid #6b4423; border-radius:14px;
    padding:22px 26px; max-width:480px; width:90%; text-align:center;
  }
  .modal h2{ margin-top:0; color:#2c4a12; }
  .quiz-progress{
    height:8px; background:#ddd; border-radius:4px; overflow:hidden; margin:10px 0 16px;
  }
  .quiz-progress i{
    display:block; height:100%; background:#e07b00; width:100%;
  }
  .quiz-progress.run i{ animation: shrink 17s linear forwards; }
  @keyframes shrink{ from{width:100%;} to{width:0%;} }
  .quiz-opts{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .quiz-opts button{
    padding:12px 8px; font-size:1rem; border-radius:8px; border:2px solid #a97c33;
    background:#fff3d1; cursor:pointer; font-weight:bold;
  }
  .quiz-opts button:hover:not(:disabled){ background:#ffe3a0; }
  .quiz-opts button.correct{ background:#8be08b !important; border-color:#2e7d32; }
  .quiz-opts button.wrong{ background:#f39b9b !important; border-color:#b71c1c; }
  .quiz-feedback{ min-height:1.4em; font-weight:bold; margin-top:8px; }
  .quiz-summary{
    margin:12px 0 4px; max-height:220px; overflow-y:auto; text-align:left;
    font-size:0.78rem; background:#fff8e6; border:1px solid #d9b96f;
    border-radius:8px; padding:8px 10px;
  }
  .sum-item{ padding:6px 4px; border-bottom:1px dashed #d9b96f; }
  .sum-item:last-child{ border-bottom:none; }
  .sum-item .mark{ font-weight:bold; margin-right:4px; }
  .sum-item.ok .mark{ color:#2e7d32; }
  .sum-item.bad .mark{ color:#b71c1c; }
  .sum-item small{ color:#5a4632; }
  #restartBtn{ background:#ffb400; border:2px solid #8a5a00; }
  @media (max-width: 820px){
    h1{ font-size:1.1rem; margin-bottom:8px; }
    body{ padding:8px 4px; }
    .topbar{ gap:6px; padding:6px 8px; }
    .stat{ padding:4px 8px; min-width:58px; font-size:0.85rem; }
    button.tool{ padding:6px 9px; font-size:0.85rem; }
    .main-area{ flex-direction:column; align-items:center; gap:10px; }
    .seedbank{ flex-direction:row; flex-wrap:wrap; justify-content:center; }
    .seed-card{ width:80px; }
    #waveBar{ width:90px; }
  }
</style>
</head>
<body>

<h1>🌻 Plants vs Zombies: Đấu Trường Toán Học 🧟</h1>

<div class="topbar">
  <div class="stat">☀️ <span id="sunCount">75</span><small>Mặt trời</small></div>
  <div class="stat">⏱️ <span id="timeCount">0:00</span><small>Thời gian</small></div>
  <div class="stat">💀 <span id="killCount">0</span><small>Zombie hạ gục</small></div>
  <div class="stat">✅ <span id="quizCount">0</span><small>Câu đúng</small></div>
  <div class="stat"><div id="waveBar"><i></i></div><small id="waveLabel">Đợt zombie</small></div>
  <button class="tool" id="shovelBtn">🧹 Xẻng</button>
  <button class="tool" id="musicBtn">🔇 Nhạc</button>
  <button class="tool" id="restartBtn">🔄 Chơi lại</button>
</div>

<div class="main-area">
  <div class="seedbank" id="seedbank"></div>
  <div id="boardHolder">
    <div class="board-wrap">
      <div class="board" id="board"></div>
      <div class="banner" id="waveBanner"></div>
    </div>
  </div>
</div>

<div class="overlay hidden" id="quizOverlay">
  <div class="modal">
    <h2>🧮 Câu hỏi bất ngờ!</h2>
    <div class="quiz-progress" id="quizProgress"><i></i></div>
    <p id="quizQuestion" style="font-size:1.05rem;font-weight:bold;"></p>
    <div class="quiz-opts" id="quizOpts"></div>
    <div class="quiz-feedback" id="quizFeedback"></div>
  </div>
</div>

<div class="overlay" id="modeOverlay">
  <div class="modal">
    <h2>🎮 Chọn chế độ chơi</h2>
    <button class="tool mode-btn" id="classicBtn">🌻 Cổ Điển<br><small>Bảo vệ khu vườn trước bầy zombie — vừa chơi vừa giải toán!</small></button>
    <button class="tool mode-btn" id="endlessBtn">♾️ Vô Tận<br><small>Sóng zombie vô tận ngày càng mạnh — mở khóa cây trồng và zombie mới!</small></button>
  </div>
</div>

<div class="overlay hidden" id="endOverlay">
  <div class="modal">
    <h2 id="endTitle"></h2>
    <p id="endStats"></p>
    <div id="quizSummary" class="quiz-summary hidden"></div>
    <button class="tool" id="playAgainBtn">🔄 Chơi lại</button>
    <button class="tool" id="modeBtn">🎮 Đổi chế độ</button>
  </div>
</div>

<script>
(function(){
  const COLS=9, ROWS=5, CELL=68;
  const boardEl=document.getElementById('board');
  const sunEl=document.getElementById('sunCount');
  const timeEl=document.getElementById('timeCount');
  const killEl=document.getElementById('killCount');
  const quizCountEl=document.getElementById('quizCount');
  const waveBarI=document.querySelector('#waveBar i');
  const waveLabelEl=document.getElementById('waveLabel');
  const waveBannerEl=document.getElementById('waveBanner');
  const seedbankEl=document.getElementById('seedbank');
  const shovelBtn=document.getElementById('shovelBtn');
  const musicBtn=document.getElementById('musicBtn');
  const restartBtn=document.getElementById('restartBtn');
  const quizOverlay=document.getElementById('quizOverlay');
  const quizQuestionEl=document.getElementById('quizQuestion');
  const quizOptsEl=document.getElementById('quizOpts');
  const quizFeedbackEl=document.getElementById('quizFeedback');
  const quizProgressEl=document.getElementById('quizProgress');
  const endOverlay=document.getElementById('endOverlay');
  const endTitleEl=document.getElementById('endTitle');
  const endStatsEl=document.getElementById('endStats');
  const quizSummaryEl=document.getElementById('quizSummary');
  const playAgainBtn=document.getElementById('playAgainBtn');

  /* ---------- SVG sprites ---------- */
  const SUN_RAYS=Array.from({length:8},(_,i)=>`<polygon points="32,3 38,17 26,17" transform="rotate(${i*45} 32 32)" fill="#ffd93b" stroke="#f0a818" stroke-width="1"/>`).join('');
  const SUN_SVG=`<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">${SUN_RAYS}<circle cx="32" cy="32" r="15" fill="#ffe066" stroke="#f5a623" stroke-width="2.5"/><circle cx="32" cy="32" r="9" fill="#fff3b0"/></svg>`;

  const SUNFLOWER_PETALS=Array.from({length:12},(_,i)=>`<ellipse cx="32" cy="8" rx="5" ry="9" fill="#ffce1f" stroke="#e6a817" stroke-width="1" transform="rotate(${i*30} 32 22)"/>`).join('');
  const SUNFLOWER_SVG=`<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg"><ellipse cx="32" cy="59" rx="12" ry="4" fill="#2f6b2f"/><rect x="28" y="36" width="8" height="23" rx="4" fill="#3a8f3a"/><path d="M28 46 Q12 40 14 52 Q22 56 29 50 Z" fill="#4caf50" stroke="#2f6b2f" stroke-width="1.5"/><path d="M36 42 Q50 36 50 47 Q43 51 36 47 Z" fill="#4caf50" stroke="#2f6b2f" stroke-width="1.5"/>${SUNFLOWER_PETALS}<circle cx="32" cy="22" r="10.5" fill="#a8702f" stroke="#7a4c1a" stroke-width="2"/><circle cx="28.5" cy="19.5" r="1.7" fill="#3d2408"/><circle cx="35.5" cy="19.5" r="1.7" fill="#3d2408"/><path d="M27.5 25 Q32 29 36.5 25" stroke="#3d2408" stroke-width="1.7" fill="none" stroke-linecap="round"/></svg>`;

  const PEASHOOTER_SVG=`<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg"><ellipse cx="26" cy="57" rx="12" ry="4" fill="#2f6b2f"/><rect x="22" y="32" width="8" height="25" rx="4" fill="#3a8f3a"/><path d="M22 42 Q6 36 8 48 Q16 52 23 46 Z" fill="#4caf50" stroke="#2f6b2f" stroke-width="1.5"/><path d="M30 38 Q42 32 42 42 Q36 46 30 43 Z" fill="#4caf50" stroke="#2f6b2f" stroke-width="1.5"/><rect x="34" y="16" width="22" height="15" rx="7.5" fill="#6ec96e" stroke="#2f6b2f" stroke-width="2.5"/><ellipse cx="53" cy="23.5" rx="5.2" ry="5.5" fill="#173417"/><circle cx="26" cy="22" r="16" fill="#6ec96e" stroke="#2f6b2f" stroke-width="2.5"/><circle cx="20" cy="15" r="4.2" fill="#fdfdfd" stroke="#2f6b2f" stroke-width="1"/><circle cx="30" cy="15" r="4.2" fill="#fdfdfd" stroke="#2f6b2f" stroke-width="1"/><circle cx="20.5" cy="16" r="1.9" fill="#1b3a1b"/><circle cx="30.5" cy="16" r="1.9" fill="#1b3a1b"/></svg>`;

  const TOMATOBOMB_SVG=`<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg"><rect x="30.5" y="8" width="3" height="11" rx="1.5" fill="#6d4c41"/><circle cx="32" cy="6" r="3" fill="#ffd93b" stroke="#f0a818" stroke-width="1"/><path d="M32 1 L32 3 M27 4 L29 5.5 M37 4 L35 5.5" stroke="#ffb300" stroke-width="1.5" stroke-linecap="round"/><circle cx="32" cy="38" r="20" fill="#e53935" stroke="#9f1c1c" stroke-width="2.5"/><ellipse cx="25" cy="30" rx="6" ry="4" fill="#ff8a80" opacity="0.75"/><path d="M32 19 L25 13 L29 19 L26 14 L31 18 L32 12 L33 18 L38 14 L35 19 L39 13 Z" fill="#43a047" stroke="#2e7031" stroke-width="1.2"/><circle cx="26" cy="36" r="2.6" fill="#4a0d0d"/><circle cx="38" cy="36" r="2.6" fill="#4a0d0d"/><path d="M21 31 L29 34 M43 31 L35 34" stroke="#4a0d0d" stroke-width="1.8" stroke-linecap="round"/><path d="M27 46 Q32 42.5 37 46" stroke="#4a0d0d" stroke-width="2" fill="none" stroke-linecap="round"/></svg>`;

  const WALLNUT_SVG=`<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg"><ellipse cx="32" cy="36" rx="21" ry="25" fill="#c98d4b" stroke="#8a5a26" stroke-width="3"/><ellipse cx="32" cy="38" rx="15" ry="19" fill="#d9a25f"/><circle cx="25" cy="28" r="5" fill="#fff" stroke="#8a5a26" stroke-width="1.2"/><circle cx="39" cy="28" r="5" fill="#fff" stroke="#8a5a26" stroke-width="1.2"/><circle cx="26" cy="29.5" r="2.3" fill="#2c1a08"/><circle cx="38" cy="29.5" r="2.3" fill="#2c1a08"/><path d="M22 20 Q25 18 28 20 M36 20 Q39 18 42 20" stroke="#6b4423" stroke-width="1.7" fill="none" stroke-linecap="round"/><path d="M28 42 Q32 45 36 42" stroke="#6b4423" stroke-width="2" fill="none" stroke-linecap="round"/></svg>`;

  const ZOMBIE_BODY=`<rect x="26" y="52" width="7" height="11" fill="#4a4a4a"/><rect x="37" y="52" width="7" height="11" fill="#3a3a3a"/><rect x="24" y="30" width="22" height="24" rx="5" fill="#7c7c7c" stroke="#565656" stroke-width="1.5"/><rect x="31" y="30" width="6" height="13" fill="#a53030"/><rect x="4" y="32" width="22" height="6.5" rx="3" fill="#9cb894" stroke="#5f7a58" stroke-width="1"/><rect x="8" y="41" width="18" height="6.5" rx="3" fill="#93af8b" stroke="#5f7a58" stroke-width="1"/>`;
  const ZOMBIE_HEAD=`<circle cx="34" cy="17" r="12.5" fill="#aac6a0" stroke="#5f7a58" stroke-width="2"/><circle cx="28" cy="14" r="3.4" fill="#fff"/><circle cx="27" cy="14.5" r="1.5" fill="#222"/><circle cx="38" cy="14" r="3" fill="#fff"/><circle cx="37" cy="14.5" r="1.4" fill="#222"/><ellipse cx="29" cy="23" rx="4" ry="2.7" fill="#40241c"/><path d="M26 22 L32 24" stroke="#2c1a12" stroke-width="1"/>`;
  const ZOMBIE_SVG=`<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">${ZOMBIE_BODY}${ZOMBIE_HEAD}</svg>`;

  let questionDeck=[], deckPos=0;
  function reshuffleDeck(){
    questionDeck=Array.from({length:QUESTIONS.length},(_,i)=>i);
    for(let i=questionDeck.length-1;i>0;i--){
      const j=Math.floor(Math.random()*(i+1));
      [questionDeck[i],questionDeck[j]]=[questionDeck[j],questionDeck[i]];
    }
    deckPos=0;
  }
  function initDeck(){
    try{
      const saved=JSON.parse(localStorage.getItem('pvzMathDeck')||'null');
      if(saved && Array.isArray(saved.deck) && saved.deck.length===QUESTIONS.length && typeof saved.pos==='number'){
        questionDeck=saved.deck; deckPos=saved.pos;
        return;
      }
    }catch(err){}
    reshuffleDeck();
  }
  function pickQuestion(){
    if(!questionDeck.length) initDeck();
    if(deckPos>=questionDeck.length) reshuffleDeck();
    const q=QUESTIONS[questionDeck[deckPos]];
    deckPos++;
    try{ localStorage.setItem('pvzMathDeck', JSON.stringify({deck:questionDeck, pos:deckPos})); }catch(err){}
    return q;
  }
  initDeck();

  /* ---------- Audio ---------- */
  let audioCtx=null, musicGain=null, sfxGain=null;
  let musicOn=false, musicUserOff=false, musicTimer=null;

  function initAudio(){
    if(audioCtx) return;
    audioCtx=new (window.AudioContext||window.webkitAudioContext)();
    musicGain=audioCtx.createGain(); musicGain.gain.value=1; musicGain.connect(audioCtx.destination);
    sfxGain=audioCtx.createGain(); sfxGain.gain.value=1; sfxGain.connect(audioCtx.destination);
  }

  function tone(dest, freq, startTime, dur, type, vol, freqEnd){
    const osc=audioCtx.createOscillator();
    const gain=audioCtx.createGain();
    osc.type=type;
    osc.frequency.setValueAtTime(freq, startTime);
    if(freqEnd) osc.frequency.linearRampToValueAtTime(freqEnd, startTime+dur);
    gain.gain.setValueAtTime(0, startTime);
    gain.gain.linearRampToValueAtTime(vol, startTime+0.015);
    gain.gain.exponentialRampToValueAtTime(0.001, startTime+dur);
    osc.connect(gain); gain.connect(dest);
    osc.start(startTime); osc.stop(startTime+dur+0.05);
  }

  function sfx(name){
    if(!audioCtx) return;
    const t=audioCtx.currentTime;
    switch(name){
      case 'plant': tone(sfxGain,110,t,0.13,'triangle',0.3,70); break;
      case 'shoot': tone(sfxGain,540,t,0.06,'square',0.07,300); break;
      case 'hit': tone(sfxGain,170,t,0.05,'square',0.13,120); break;
      case 'sun': tone(sfxGain,988,t,0.1,'sine',0.2); tone(sfxGain,1319,t+0.08,0.14,'sine',0.18); break;
      case 'chomp': tone(sfxGain,75,t,0.09,'square',0.16,55); break;
      case 'zdie': tone(sfxGain,220,t,0.3,'sawtooth',0.16,50); break;
      case 'mower': tone(sfxGain,90,t,0.75,'sawtooth',0.3,190); break;
      case 'boom': tone(sfxGain,150,t,0.5,'sawtooth',0.45,40); tone(sfxGain,80,t,0.4,'square',0.3,30); break;
      case 'correct': tone(sfxGain,660,t,0.12,'sine',0.22); tone(sfxGain,880,t+0.12,0.2,'sine',0.22); break;
      case 'wrong': tone(sfxGain,150,t,0.32,'square',0.16,110); break;
      case 'win': [523,659,784,1047].forEach((f,i)=>tone(sfxGain,f,t+i*0.16,0.22,'triangle',0.22)); break;
      case 'lose': [330,294,262,220].forEach((f,i)=>tone(sfxGain,f,t+i*0.22,0.3,'triangle',0.22)); break;
    }
  }

  function scheduleMusicLoop(){
    if(!musicOn) return;
    const startAt=audioCtx.currentTime+0.05;
    let t=startAt;
    MELODY.forEach(([f,d])=>{ tone(musicGain,f,t,d*0.85,'triangle',0.08); t+=d; });
    let bt=startAt;
    BASS.forEach(([f,d])=>{ tone(musicGain,f/2,bt,d*0.9,'square',0.045); bt+=d; });
    musicTimer=setTimeout(scheduleMusicLoop,(t-startAt)*1000);
  }

  function setMusic(on){
    if(on){

      if(audioCtx.state==='suspended') audioCtx.resume();

      musicOn=true;
      musicBtn.textContent='🔊 Nhạc';
      scheduleMusicLoop();
    } else {
      musicOn=false;
      musicBtn.textContent='🔇 Nhạc';
      clearTimeout(musicTimer);

  function repairMower(){
    const used=mowers.filter(mm=>mm.state==='used');
    if(!used.length) return false;
    used.sort((a,b)=>{
      const minA=Math.min.apply(null, zombies.filter(z=>z.row===a.row).map(z=>z.col).concat([99]));
      const minB=Math.min.apply(null, zombies.filter(z=>z.row===b.row).map(z=>z.col).concat([99]));
      return minA-minB;
    });
    const m=used[0];
    m.state='ready'; m.kills=0; m.x=2;
    m.el=makeMowerEl(m.row);
    spawnFloat(6, m.row*CELL+20, '🔧 +1 🚜', '#8be08b');
    return true;

  function refreshSeedbankUI(){
    [...seedbankEl.children].forEach(card=>{
      const key=card.dataset.type;
      const def=PLANT_TYPES[key];
      card.classList.toggle('selected', selectedTool===key);
      const cantAfford = sun<def.cost;
      const onCooldown = seedCooldowns[key]>0;
      card.classList.toggle('disabled', cantAfford||onCooldown);
      let cdEl=card.querySelector('.cooldown');
      if(onCooldown){
        if(!cdEl){ cdEl=document.createElement('div'); cdEl.className='cooldown'; card.appendChild(cdEl); }
        cdEl.textContent=Math.ceil(seedCooldowns[key])+'s';
      } else if(cdEl){ cdEl.remove(); }

  function onCellClick(r,c){
    if(ended) return;
    if(shovelOn){
      const p=grid[r][c];
      if(p){ p.el.remove(); grid[r][c]=null; }
      return;
    }
    if(!selectedTool) return;
    const def=PLANT_TYPES[selectedTool];
    if(sun<def.cost) return;
    if(grid[r][c]) return;
    sun-=def.cost;
    const el=makePlantEl(def);
    boardEl.children[r*COLS+c].appendChild(el);
    grid[r][c]={ type:selectedTool, hp:def.hp, maxHp:def.hp, timer:def.produce?5:0, cd:0, fuse:def.bomb?def.bomb.fuse:0, el };
    seedCooldowns[selectedTool]=def.cooldown;
    sfx('plant');
    spawnFloat(c*CELL+CELL/2, r*CELL+10, '-'+def.cost+' ☀️', '#ff6666');
    selectedTool=null;
    refreshSeedbankUI();
  }

  function explodeBomb(r,c,p){
    const isRow=!!PLANT_TYPES[p.type].bomb.row;
    p.el.remove();
    grid[r][c]=null;
    sfx('boom');
    if(isRow){
      const flame=document.createElement('div');
      flame.className='rowboom';
      flame.style.top=(r*CELL)+'px';
      boardEl.appendChild(flame);
      setTimeout(()=>flame.remove(), 700);
      zombies.forEach(z=>{
        if(z.row===r && z.hp>0){ z.hp=0; stats.killed++; }
      });
      zombies=zombies.filter(z=>{
        if(z.hp<=0){ z.el.remove(); return false; }
        return true;
      });
      return;
    }
    const boomEl=document.createElement('div');
    boomEl.className='boom';
    boomEl.style.left=(c*CELL+CELL/2-100)+'px';
    boomEl.style.top=(r*CELL+CELL/2-100)+'px';
    boardEl.appendChild(boomEl);
    setTimeout(()=>boomEl.remove(), 600);
    zombies.forEach(z=>{
      if(Math.abs(z.row-r)<=1 && z.col>=c-1.6 && z.col<=c+1.6){
        if(z.hp>0){ z.hp=0; stats.killed++; }
      }
    });
    zombies=zombies.filter(z=>{
      if(z.hp<=0){ z.el.remove(); return false; }
      return true;
    });
  }

  function spawnEndlessWave(n){
    const pool=['normal'];
    if(n>=3) pool.push('cone');
    if(n>=3) pool.push('runner');
    if(n>=5) pool.push('bucket');
    if(n>=8) pool.push('cone','bucket');
    let count=Math.min(2+Math.ceil(n/2), 10);
    if(n%5===0){ count+=3; showBanner('ĐỢT KHỔNG LỒ '+n+'! 💀'); }
    else { showBanner('Đợt '+n+'!'); }
    const rows=[0,1,2,3,4].sort(()=>Math.random()-0.5);
    for(let i=0;i<count;i++){
      const type=pool[Math.floor(Math.random()*pool.length)];
      zombies.push(makeZombie({ row:rows[i%5], type, col:COLS+0.6*Math.floor(i/5)+0.2*(i%5) }));
    }
  }

  function spawnPenaltyEndless(){
    const n=3+Math.floor(wave/2);
    const pool=['normal','normal','cone'];
    if(wave>=3) pool.push('runner');
    if(wave>=5) pool.push('bucket');
    for(let i=0;i<n;i++){
      zombies.push(makeZombie({ row:Math.floor(Math.random()*ROWS), type:pool[Math.floor(Math.random()*pool.length)], col:COLS+0.5*i }));
    }
    showBanner('Sai rồi! Zombie tiếp viện! 🧟');
  }

  function resetGame(){
    sun=125;
    grid=Array.from({length:ROWS},()=>Array(COLS).fill(null));
    zombies=[]; projectiles=[]; floaters=[]; sunTokens=[];
    selectedTool=null; shovelOn=false;
    seedCooldowns={sunflower:0, peashooter:0, tomatobomb:0, wallnut:0, repeater:0, chili:0};
    elapsed=0; running=true; ended=false; spawnIndex=0;
    quizIndex=0; wrongCount=0; quizActive=false; quizLog=[];
    wave=0; waveInterval=18; nextWaveTime=10; nextQuizTimeE=20; megaHorde2At=0;
    nextSkySun=4; finalBannerShown=false;
    stats={killed:0, quizCorrect:0};
    quizOverlay.classList.add('hidden');
    endOverlay.classList.add('hidden');
    waveBannerEl.classList.remove('show');
    if(quizTimeoutId) clearTimeout(quizTimeoutId);
    buildBoard();
    buildBrains();
    buildMowers();
    buildSeedbank();
    shovelActive(false);
    updateHud();
    lastTime=performance.now();
  }

  function updateHud(){
    sunEl.textContent=sun;
    const m=Math.floor(elapsed/60), s=Math.floor(elapsed%60);
    timeEl.textContent=m+':'+(s<10?'0':'')+s;
    killEl.textContent=stats.killed;
    quizCountEl.textContent=stats.quizCorrect;
    if(gameMode==='endless'){
      waveLabelEl.textContent='Đợt: '+wave;
      waveBarI.style.width=Math.max(0, Math.min(100, (1-(nextWaveTime-elapsed)/waveInterval)*100))+'%';
    } else {
      waveLabelEl.textContent='Đợt zombie';
      waveBarI.style.width=(spawnIndex/TOTAL_SPAWNS*100)+'%';
    }
    refreshSeedbankUI();
  }

  function loop(now){
    const dt=Math.min((now-lastTime)/1000, 0.1);
    lastTime=now;
    if(running && !ended && !quizActive){
      update(dt);
    }
    render();
    requestAnimationFrame(loop);
  }

  function update(dt){
    if(ended) return;
    elapsed+=dt;

    Object.keys(seedCooldowns).forEach(k=>{ if(seedCooldowns[k]>0) seedCooldowns[k]=Math.max(0,seedCooldowns[k]-dt); });

    if(elapsed>=2 && elapsed-dt<2) showBanner('Zombie đang đến!');

    if(gameMode==='endless'){
      if(elapsed>=nextWaveTime){
        wave++;
        spawnEndlessWave(wave);
        waveInterval=Math.max(9, 19-wave*0.6);
        nextWaveTime=elapsed+waveInterval;
      }
      if(!quizActive && elapsed>=nextQuizTimeE){
        triggerQuiz();
      }
    }

    while(gameMode==='classic' && spawnIndex<SPAWN_SCHEDULE.length && elapsed>=SPAWN_SCHEDULE[spawnIndex].t){
      const s=SPAWN_SCHEDULE[spawnIndex];
      zombies.push(makeZombie(s));
      if(s.final && !finalBannerShown){
        finalBannerShown=true;
        showBanner('ĐỢT CUỐI CÙNG!');
        const extraRows=[2,1,3,0,4];
        for(let i=0;i<wrongCount*2;i++){
          zombies.push(makeZombie({ row:extraRows[i%5], type:(i%3===0?'cone':'normal'), col:COLS+0.4*(i%5)+0.5*Math.floor(i/5) }));
        }
      }
      spawnIndex++;
    }

    if(elapsed>=nextSkySun){
      nextSkySun=elapsed+13+Math.random()*4;
      const col=1+Math.floor(Math.random()*(COLS-1));
      const row=Math.floor(Math.random()*ROWS);
      spawnSunToken(col*CELL+7, -56, row*CELL+7, 9);
    }

    if(gameMode==='classic' && !quizActive && quizIndex<QUIZ_TIMES.length && elapsed>=QUIZ_TIMES[quizIndex]){
      quizIndex++;
      triggerQuiz();
    }
    if(megaHorde2At && elapsed>=megaHorde2At){
      megaHorde2At=0;
      spawnMegaHordeStage2();
    }

    for(let r=0;r<ROWS;r++){
      for(let c=0;c<COLS;c++){
        const p=grid[r][c];
        if(!p) continue;
        const def=PLANT_TYPES[p.type];
        if(def.produce){
          p.timer+=dt;
          if(p.timer>=def.produce.every){
            p.timer=0;
            spawnSunToken(c*CELL+7, r*CELL-14, r*CELL+7, 10);
          }
        }
        if(def.attack){
          p.cd-=dt;
          if(p.cd<=0){
            const target=zombies.find(z=>z.hp>0 && z.row===r && z.col>c-0.3 && z.col<COLS+0.5);
            if(target){
              projectiles.push({ row:r, x:c*CELL+CELL*0.72, damage:def.attack.damage, speed:def.attack.speed });
              if(def.attack.double) projectiles.push({ row:r, x:c*CELL+CELL*0.72-16, damage:def.attack.damage, speed:def.attack.speed });
              p.cd=def.attack.every;
              sfx('shoot');
            }
          }
        }
        if(def.bomb){
          p.fuse-=dt;
          if(p.fuse<=0) explodeBomb(r,c,p);
        }
      }
    }

    zombies.forEach(z=>{
      if(z.frozenUntil>elapsed){ z.attacking=false; return; }
      const c=Math.floor(z.col);
      if(c>=0 && c<COLS && grid[z.row][c]){
        z.attacking=true;
        z.attackTimer+=dt;
        if(z.attackTimer>=0.9){
          z.attackTimer=0;
          if(Math.random()<0.6) sfx('chomp');
          const plant=grid[z.row][c];
          plant.hp-=z.dmg;
          if(plant.hp<=0){ plant.el.remove(); grid[z.row][c]=null; z.attacking=false; }
        }
      } else {
        z.attacking=false;
        z.col-=z.speed*dt;
      }
    });

    projectiles.forEach(pr=>{ pr.x+=pr.speed*dt; });
    projectiles=projectiles.filter(pr=>{
      if(pr.x>COLS*CELL) return false;
      const hit=zombies.find(z=>z.row===pr.row && z.hp>0 && Math.abs(z.col*CELL-pr.x)<24);
      if(hit){
        hit.hp-=pr.damage;
        sfx('hit');
        if(hit.hp<=0){ stats.killed++; sfx('zdie'); }
        return false;
      }
      return true;
    });
    zombies=zombies.filter(z=>{
      if(z.hp<=0){ z.el.remove(); return false; }
      return true;
    });

    zombies.forEach(z=>{
      if(z.col<=-0.1){
        const mower=mowers[z.row];
        if(mower.state==='ready'){
          mower.state='running';
          sfx('mower');
        } else if(mower.state==='running'){
          z.hp=0;
        } else {
          const brain=brains[z.row];
          if(!brain.eaten){
            brain.eaten=true;
            brain.eatenAt=elapsed;
            brain.el.classList.add('eaten');
            sfx('chomp');
            spawnFloat(8, z.row*CELL+8, '🧠!!', '#ff8bd0');
          }
          z.attacking=true;
          z.col=Math.max(z.col, -0.15);
        }
      }
    });
    brains.forEach(b=>{
      if(b.eaten && elapsed>=b.eatenAt+1.1){ endGame(false); }
    });
    if(ended) return;

    mowers.forEach(m=>{
      if(m.state!=='running') return;
      m.x+=330*dt;
      zombies.forEach(z=>{
        if(m.kills<4 && z.row===m.row && z.col*CELL < m.x+46){
          if(z.hp>0){ z.hp=0; stats.killed++; sfx('zdie'); m.kills++; }
        }
      });
      if(m.kills>=4 || m.x>COLS*CELL+20){
        if(m.kills>=4) spawnFloat(m.x, m.row*CELL+16, '💨💥', '#bbbbbb');
        m.state='used'; m.el.remove();
      }
    });
    zombies=zombies.filter(z=>{
      if(z.hp<=0){ z.el.remove(); return false; }
      return true;
    });

    sunTokens.forEach(tk=>{
      if(tk.dead) return;
      if(tk.y<tk.targetY){
        tk.y=Math.min(tk.targetY, tk.y+62*dt);
      } else {
        tk.life-=dt;
        if(tk.life<=0){ tk.dead=true; tk.el.remove(); }
      }
    });
    sunTokens=sunTokens.filter(tk=>!tk.dead);

    if(gameMode==='classic'){
      if(spawnIndex>=SPAWN_SCHEDULE.length && zombies.length===0 && !quizActive && quizIndex>=QUIZ_TIMES.length){
        return endGame(true);
      }
      if(elapsed>=HARD_TIME_CAP){
        return endGame(zombies.length===0);
      }
    }

    floaters.forEach(f=>f.life+=dt);
    floaters=floaters.filter(f=>f.life<1.1);

    updateHud();
  }

  function triggerQuiz(){
    quizActive=true;
    const question=pickQuestion();
    currentQuestion=question;
    correctBtnEl=null;
    quizQuestionEl.textContent=question.q;
    quizFeedbackEl.textContent='';
    quizOptsEl.innerHTML='';
    const order=[0,1,2,3];
    for(let i=order.length-1;i>0;i--){
      const j=Math.floor(Math.random()*(i+1));
      [order[i],order[j]]=[order[j],order[i]];
    }
    order.forEach(i=>{
      const btn=document.createElement('button');
      btn.textContent=question.opts[i];
      if(i===question.a) correctBtnEl=btn;
      btn.addEventListener('click', ()=>answerQuiz(i===question.a, btn));
      quizOptsEl.appendChild(btn);
    });
    quizOverlay.classList.remove('hidden');
    quizProgressEl.classList.remove('run');
    void quizProgressEl.offsetWidth;
    quizProgressEl.classList.add('run');
    quizTimeoutId=setTimeout(()=>answerQuiz(false,null), 17000);
  }

  function answerQuiz(correct, btnEl){
    if(!quizActive) return;
    quizActive=false;
    clearTimeout(quizTimeoutId);
    [...quizOptsEl.children].forEach(b=>b.disabled=true);
    if(btnEl) btnEl.classList.add(correct?'correct':'wrong');
    if(correct){
      stats.quizCorrect++;
      sun+=75;
      zombies.forEach(z=>{ z.frozenUntil=elapsed+5; });
      sfx('correct');
      const repaired=repairMower();
      quizFeedbackEl.textContent='Chính xác! +75 ☀️, zombie đóng băng 5 giây'+(repaired?' và sửa lại 1 máy cắt cỏ! 🚜':'!');
      quizFeedbackEl.style.color='#2e7d32';
    } else {
      sfx('wrong');
      quizFeedbackEl.innerHTML='Sai rồi! Zombie tiếp viện đang tràn vào!<br><small>Đáp án đúng: <b>'+currentQuestion.opts[0]+'</b> — '+currentQuestion.e+'</small>';
      quizFeedbackEl.style.color='#b71c1c';
      if(correctBtnEl) correctBtnEl.classList.add('correct');
      if(gameMode==='classic') spawnPenalty(); else spawnPenaltyEndless();
    }
    quizLog.push({q:currentQuestion.q, ans:currentQuestion.opts[0], e:currentQuestion.e, ok:correct});
    if(gameMode==='classic' && quizIndex>=QUIZ_TIMES.length && stats.quizCorrect<4){
      spawnMegaHorde();
    }
    if(gameMode==='endless'){ nextQuizTimeE=elapsed+22; }
    setTimeout(()=>{ quizOverlay.classList.add('hidden'); }, correct?1400:4200);
  }

  function endGame(win){
    if(ended) return;
    ended=true; running=false;
    quizActive=false;
    clearTimeout(quizTimeoutId);
    quizOverlay.classList.add('hidden');
    waveBannerEl.classList.remove('show');
    sfx(win?'win':'lose');
    if(gameMode==='endless'){
      endTitleEl.textContent='💀 Bạn đã trụ được '+wave+' đợt zombie!';
    } else {
      endTitleEl.textContent = win ? '🎉 Chiến thắng! Ngôi nhà an toàn!'
        : (elapsed>=HARD_TIME_CAP ? '⏰ Hết giờ! Vẫn còn zombie trên bãi cỏ!' : '💀 Zombie đã ăn não của bạn! Thất bại!');
    }
    const m=Math.floor(elapsed/60), s=Math.floor(elapsed%60);
    endStatsEl.innerHTML = `Thời gian: ${m}:${s<10?'0':''}${s} &nbsp;|&nbsp; Zombie hạ gục: ${stats.killed} &nbsp;|&nbsp; Câu đúng: ${stats.quizCorrect}/${gameMode==='classic'?6:quizLog.length}`;
    if(quizLog.length){
      quizSummaryEl.classList.remove('hidden');
      quizSummaryEl.innerHTML='<b>📘 Ôn tập nhanh:</b>'+quizLog.map(it=>
        '<div class="sum-item '+(it.ok?'ok':'bad')+'"><span class="mark">'+(it.ok?'✔':'✘')+'</span> '+it.q+
        '<br><small><b>'+it.ans+'</b> — '+it.e+'</small></div>').join('');
    } else {
      quizSummaryEl.classList.add('hidden');
    }
    endOverlay.classList.remove('hidden');
    updateHud();
  }

  function render(){
    for(let r=0;r<ROWS;r++){
      for(let c=0;c<COLS;c++){
        const p=grid[r][c];
        if(!p) continue;
        const bar=p.el.querySelector('.hp-bar');
        if(p.hp<p.maxHp){
          bar.style.display='block';
          bar.firstChild.style.width=Math.max(0,p.hp/p.maxHp*100)+'%';
        }
      }
    }

    zombies.forEach(z=>{
      z.el.style.left=(z.col*CELL)+'px';
      z.el.style.top=(z.row*CELL)+'px';
      z.el.classList.toggle('eating', z.attacking && z.frozenUntil<=elapsed);
      z.el.classList.toggle('frozen', z.frozenUntil>elapsed);
      z.barI.style.width=Math.max(0,z.hp/z.maxHp*100)+'%';
    });

    mowers.forEach(m=>{
      if(m.state==='running') m.el.style.left=m.x+'px';
    });

    sunTokens.forEach(tk=>{
      tk.el.style.top=tk.y+'px';
    });

    [...boardEl.querySelectorAll('.pea,.floatText')].forEach(el=>el.remove());
    projectiles.forEach(pr=>{
      const el=document.createElement('div');
      el.className='pea';
      el.style.left=pr.x+'px';
      el.style.top=(pr.row*CELL+CELL/2-10)+'px';
      boardEl.appendChild(el);
    });
    floaters.forEach(f=>{
      const el=document.createElement('div');
      el.className='floatText';
      el.style.left=f.x+'px';
      el.style.top=(f.y-f.life*34)+'px';
      el.style.opacity=String(1-f.life/1.1);
      el.style.color=f.color;
      el.textContent=f.text;
      boardEl.appendChild(el);
    });

    sunEl.textContent=sun;
    refreshSeedbankUI();
  }

  restartBtn.addEventListener('click', resetGame);
  playAgainBtn.addEventListener('click', resetGame);

  const modeOverlayEl=document.getElementById('modeOverlay');
  function startGame(mode){
    gameMode=mode;
    modeOverlayEl.classList.add('hidden');
    resetGame();
  }
  document.getElementById('classicBtn').addEventListener('click', ()=>startGame('classic'));
  document.getElementById('endlessBtn').addEventListener('click', ()=>startGame('endless'));
  document.getElementById('modeBtn').addEventListener('click', ()=>{
    endOverlay.classList.add('hidden');
    modeOverlayEl.classList.remove('hidden');
  });

  const boardHolderEl=document.getElementById('boardHolder');
  const boardWrapEl=document.querySelector('.board-wrap');
  function fitBoard(){
    const naturalW=COLS*CELL+8;
    const naturalH=ROWS*CELL+8;
    const avail=document.documentElement.clientWidth-12;
    const sc=Math.min(1, avail/naturalW);
    if(sc<1){
      boardWrapEl.style.transform='scale('+sc+')';
      boardWrapEl.style.transformOrigin='top left';
      boardHolderEl.style.width=(naturalW*sc)+'px';
      boardHolderEl.style.height=(naturalH*sc)+'px';
    } else {
      boardWrapEl.style.transform='';
      boardHolderEl.style.width='';
      boardHolderEl.style.height='';
    }
  }
  window.addEventListener('resize', fitBoard);
  window.addEventListener('orientationchange', ()=>setTimeout(fitBoard, 250));

  resetGame();
  running=false;
  fitBoard();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
